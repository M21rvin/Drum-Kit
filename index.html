<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Drum Kit</h1>
        <p>Press the buttons or use the keyboard to play the drums!</p>
        <div class="set">
            <button class="drum" id="w"><img src="/images/crash.png" alt="W"></button>
            <button class="drum" id="a"><img src="/images/snare.png" alt="A"></button>
            <button class="drum" id="s"><img src="/images/tom4.png" alt="S"></button>
            <button class="drum" id="d"><img src="/images/kick.png" alt="D"></button>
            <button class="drum" id="j"><img src="/images/tom3.png" alt="J"></button>
            <button class="drum" id="k"><img src="/images/tom1.png" alt="K"></button>
            <button class="drum" id="l"><img src="/images/tom2.png" alt="L"></button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
